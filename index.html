<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RealMatch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      max-width: 600px;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 10px;
    }

    .highlight {
      color: #6366f1;
    }

    p {
      color: #94a3b8;
      font-size: 1.1rem;
      margin-bottom: 25px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    iframe {
      border-radius: 10px;
      background: white;
    }

    .points {
      margin-top: 20px;
      text-align: left;
      font-size: 0.95rem;
      color: #cbd5f5;
    }

    .points div {
      margin: 5px 0;
    }

    .badge {
      margin-top: 15px;
      font-size: 0.8rem;
      color: #22c55e;
    }

    .footer {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #64748b;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Your <span class="highlight">Reddit</span> knows you better.</h1>

    <p>
      Dating apps show who people pretend to be.<br>
      We match you based on how you actually think.
    </p>

    <div class="card">
      <iframe 
        src="https://forms.gle/6ZXKNWhMjYXzKxge8"
        width="100%" 
        height="400" 
        frameborder="0">
      </iframe>

      <div class="badge">
        🚀 Only first 100 users get early access
      </div>
    </div>

    <div class="points">
      <div>✅ No fake bios</div>
      <div>✅ No curated personalities</div>
      <div>✅ Just real behavior</div>
    </div>

    <div class="footer">
      We only analyze public Reddit activity with your permission.
    </div>
  </div>

</body>
</html>
